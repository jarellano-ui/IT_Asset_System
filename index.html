                  <h2 className="text-white font-semibold text-lg flex items-center gap-2">
                    <Activity size={20} className="text-white"/> Current View Status
                  </h2>
                  <div className="bg-white/10 px-4 py-1 rounded-full text-white font-mono text-sm border border-white/20">
                    Total Count: {stats.total}
                  </div>
                </div>
                <div className="p-6">
                  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    <div className="flex flex-col gap-2 h-full w-full">
                      <button onClick={() => setExpandedAssigned(!expandedAssigned)} className={"flex flex-col items-start px-4 py-3 rounded-lg border-2 transition-all w-full h-full " + (expandedAssigned ? "bg-blue-50 border-blue-400 shadow-inner" : "bg-white border-blue-200 hover:border-blue-400 shadow-sm")}>
                        <div className="flex justify-between items-start w-full">
                          <div className="flex flex-col text-left">
                            <span className="text-xs font-bold text-blue-500 tracking-wider uppercase">Assigned</span>
                            <span className="text-2xl font-bold text-blue-900 leading-none mt-1">{stats["ASSIGNED_TOTAL"]}</span>
                          </div>
                          <ChevronRight size={20} className={"text-blue-400 mt-1 transition-transform shrink-0 " + (expandedAssigned ? "rotate-90" : "")} />
                        </div>
                        <div className="mt-auto pt-3 text-[11px] w-full flex flex-col gap-1">
                          <div className="flex justify-between items-center px-2 py-1 bg-[#5C6B42]/10 border border-[#5C6B42]/40 rounded transition-colors hover:bg-[#5C6B42]/20">
                            <span className="flex items-center gap-1 font-semibold text-[#5C6B42]"><ShieldCheck size={12}/> Covered</span> 
                            <strong className="text-slate-900">{stats["ASSIGNED_TOTAL_covered"]}</strong>
                          </div>
                          <div className="flex justify-between items-center px-2 py-1 bg-[#EE536B]/10 border border-[#EE536B]/40 rounded transition-colors hover:bg-[#EE536B]/20">
                            <span className="flex items-center gap-1 font-semibold text-[#EE536B]"><ShieldAlert size={12}/> Out of Wty</span> 
                            <strong className="text-slate-900">{stats["ASSIGNED_TOTAL"] - stats["ASSIGNED_TOTAL_covered"]}</strong>
                          </div>
                        </div>
                      </button>
                      {expandedAssigned && (
                        <div className="flex flex-col gap-2 mt-1 animate-in fade-in slide-in-from-top-2">
                          <button onClick={() => setSelectedStatus("ASSIGNED_CLEAN")} className="bg-blue-100 hover:bg-blue-200 text-blue-800 px-3 py-2 rounded shadow-sm transition-colors text-left flex justify-between items-center w-full">
                            <span className="text-xs font-bold">ASSIGNED</span>
                            <span className="text-sm font-bold bg-white/50 px-2 py-0.5 rounded">{stats["ASSIGNED_CLEAN"]}</span>
                          </button>
                          <button onClick={() => setSelectedStatus("ASSIGNED_BROKEN")} className="bg-purple-100 hover:bg-purple-200 text-purple-800 px-3 py-2 rounded shadow-sm transition-colors text-left flex justify-between items-center w-full">
                            <span className="text-xs font-bold leading-tight">BROKEN<br/>(DEPLOYED)</span>
                            <span className="text-sm font-bold bg-white/50 px-2 py-0.5 rounded">{stats["ASSIGNED_BROKEN"]}</span>
                          </button>
                        </div>
                      )}
                    </div>

                    {[
                      { key: "READY FOR ASSIGNMENT", color: "green", label: "Ready for Assignment" },
                      { key: "READY FOR DISPOSAL", color: "slate", label: "Ready for Disposal" },
                      { key: "BROKEN (DEPLOYABLE)", color: "orange", label: "Broken (Deployable)" },
                      { key: "EVALUATE / INVESTIGATE", color: "emerald", label: "Evaluate / Investigate" },
                      { key: "OUT FOR REPAIR", color: "teal", label: "Out for Repair" },
                      { key: "LOST OR STOLEN", color: "red", label: "Lost / Stolen" }
                    ].map(statConfig => {
                      const colorClasses = getStatColorClasses(statConfig.color);
                      return (
                      <button key={statConfig.key} onClick={() => setSelectedStatus(statConfig.key)} className={"flex flex-col items-start px-4 py-3 rounded-lg border-2 bg-white shadow-sm transition-colors group h-full w-full " + colorClasses.border}>
                        <div className="flex justify-between items-start w-full">
                          <span className={"text-xs font-bold tracking-wider uppercase text-left pr-2 " + colorClasses.text}>{statConfig.label}</span>
                          <Info size={16} className={"opacity-0 group-hover:opacity-100 transition-opacity shrink-0 " + colorClasses.icon} />
                        </div>
                        <span className={"text-2xl font-bold leading-none mt-1 " + colorClasses.textDark}>{stats[statConfig.key]}</span>
                        <div className="mt-auto pt-3 text-[11px] w-full flex flex-col gap-1">
                          <div className="flex justify-between items-center px-2 py-1 bg-[#5C6B42]/10 border border-[#5C6B42]/40 rounded transition-colors hover:bg-[#5C6B42]/20">
                            <span className="flex items-center gap-1 font-semibold text-[#5C6B42]"><ShieldCheck size={12}/> Covered</span> 
                            <strong className="text-slate-900">{stats[statConfig.key + "_covered"]}</strong>
                          </div>
                          <div className="flex justify-between items-center px-2 py-1 bg-[#EE536B]/10 border border-[#EE536B]/40 rounded transition-colors hover:bg-[#EE536B]/20">
                            <span className="flex items-center gap-1 font-semibold text-[#EE536B]"><ShieldAlert size={12}/> Out of Wty</span> 
                            <strong className="text-slate-900">{stats[statConfig.key] - stats[statConfig.key + "_covered"]}</strong>
                          </div>
                        </div>
                      </button>
                    )})}
                  </div>
                  <p className="text-xs text-slate-400 mt-6 text-center">Click any status pill to view detailed Warranty & Repair analysis.</p>
                </div>
              </section>

              {path.length > 0 && (
                <div>
                  <button onClick={() => navigateUp(path.length - 1)} className="flex items-center gap-2 text-slate-600 hover:text-blue-600 bg-white border border-slate-200 px-4 py-2 rounded-lg font-medium shadow-sm transition-colors w-fit">
                    <ArrowLeft size={16} />
                    Go Back
                  </button>
                </div>
              )}

              {options !== null ? (
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 animate-in fade-in duration-300">
                  {options.map(([name, count]) => (
                    <button key={name} onClick={() => drillDown(name)} className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:shadow-md hover:border-blue-300 transition-all flex flex-col items-center justify-center gap-4 text-center group">
                      <div className="bg-slate-50 p-4 rounded-full group-hover:bg-blue-50 transition-colors">{getIconForCategory(name, path[0])}</div>
                      <div>
                        <h3 className="font-bold text-slate-800 text-lg group-hover:text-blue-700 transition-colors">{name}</h3>
                        <p className="text-sm text-slate-500 mt-1">{count} Assets</p>
                      </div>
                    </button>
                  ))}
                  {options.length === 0 && (<div className="col-span-full py-12 text-center text-slate-500 bg-white rounded-xl border border-dashed border-slate-300">No sub-categories found.</div>)}
                </div>
              ) : (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden animate-in fade-in duration-300">
                  <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <h3 className="font-semibold text-slate-800 shrink-0">Asset Inventory ({tableData.length})</h3>
                    <div className="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                      <div className="relative">
                        <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16} />
                        <input type="text" placeholder="Search name, serial or model..." value={inventorySearch} onChange={(e) => setInventorySearch(e.target.value)} className="pl-9 pr-4 py-2 border border-slate-200 rounded-lg text-sm w-full sm:w-64 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                      </div>
                      <select value={inventoryStatusFilter} onChange={(e) => setInventoryStatusFilter(e.target.value)} className="px-4 py-2 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-auto">
                        <option value="ALL">All Statuses</option>
                        {availableStatuses.map(status => (<option key={status} value={status}>{status}</option>))}
                      </select>
                    </div>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm text-left">
                      <thead className="bg-slate-100 text-slate-600 uppercase text-xs">
                        <tr><th className="px-6 py-3">Asset Name</th><th className="px-6 py-3">Serial Number</th><th className="px-6 py-3">Model</th><th className="px-6 py-3">Status</th><th className="px-6 py-3">Warranty</th></tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {tableData.slice(0, 100).map((item, i) => (
                          <tr key={i} className="hover:bg-slate-50 transition-colors">
                            <td className="px-6 py-4 font-medium text-slate-800">{item.assetName}</td>
                            <td className="px-6 py-4 font-mono text-slate-500">{item.originalRow[8] || "N/A"}</td>
                            <td className="px-6 py-4">{item.model}</td>
                            <td className="px-6 py-4"><span className="bg-slate-100 text-slate-800 px-2 py-1 rounded text-xs font-bold border border-slate-200">{item.assignedSubStatus || item.primaryStatus}</span></td>
                            <td className="px-6 py-4">
                              {item.isCovered ? (
                                <span className="text-[#5C6B42] font-semibold flex items-center gap-1"><ShieldCheck size={14}/> Covered ({item.warrantyLimit}Y)</span>
                              ) : (
                                <div className="flex flex-col">
                                  <span className="text-[#EE536B] font-semibold flex items-center gap-1"><ShieldAlert size={14}/> Out of Warranty ({item.warrantyLimit}Y)</span>
                                  {item.isVoidedByDamage && <span className="text-[10px] text-[#EE536B]/80 font-bold uppercase mt-0.5 leading-tight">Voided (Broken)</span>}
                                </div>
                              )}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    {tableData.length > 100 && (<div className="p-4 text-center text-xs text-slate-500 bg-slate-50">Showing first 100 items.</div>)}
                  </div>
                </div>
              )}
            </React.Fragment>
            )}
          </main>

          {/* STATUS MODAL (DASHBOARD ONLY) */}
          {selectedStatus && activeTab === 'dashboard' && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={(e) => { if(e.target === e.currentTarget) setSelectedStatus(null) }}>
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col animate-in zoom-in-95 duration-200">
                <div className="bg-slate-800 p-6 text-white flex justify-between items-start">
                  <div>
                    <h2 className="text-2xl font-bold mb-1 flex items-center gap-2">Status Summary: {selectedStatus.replace("_", " ")}</h2>
                    <p className="text-slate-300 text-sm">Detailed breakdown and warranty diagnostics for the selected status.</p>
                  </div>
                  <button onClick={() => setSelectedStatus(null)} className="text-slate-400 hover:text-white bg-slate-700 hover:bg-slate-600 rounded-full p-2 transition-colors"><ArrowLeft size={20} /></button>
                </div>
                <div className="p-6 overflow-y-auto flex-1 bg-slate-50">
                  {(() => {
                    let filteredForWarranty = [];
                    if (selectedStatus === "ASSIGNED_CLEAN") { filteredForWarranty = filteredData.filter(i => i.primaryStatus === "ASSIGNED" && i.assignedSubStatus !== "BROKEN (DEPLOYED)"); } 
                    else if (selectedStatus === "ASSIGNED_BROKEN") { filteredForWarranty = filteredData.filter(i => i.assignedSubStatus === "BROKEN (DEPLOYED)"); } 
                    else { filteredForWarranty = filteredData.filter(i => i.primaryStatus === selectedStatus); }

                    const levelIndex = path.length; 
                    const keyGetter = item => item.drilldownPath.length > levelIndex ? item.drilldownPath[levelIndex] : null;
                    const breakdownLabel = levelIndex === 0 ? "Main Category Breakdown" : "Sub-Category Breakdown";

                    const breakdownMap = {};
                    if (keyGetter) { filteredForWarranty.forEach(item => { const key = keyGetter(item); if (key && key !== "Unknown") { breakdownMap[key] = (breakdownMap[key] || 0) + 1; } }); }
                    const breakdownEntries = Object.entries(breakdownMap).sort((a, b) => b[1] - a[1]);

                    const conditionA = filteredForWarranty.filter(i => i.isCovered); const conditionB = filteredForWarranty.filter(i => !i.isCovered);
                    const evalCount = conditionA.filter(i => i.damageStatus === "EVALUATE / INVESTIGATE").length; const repairCount = conditionA.filter(i => i.damageStatus === "OUT FOR REPAIR").length;

                    return (
                      <div className="flex flex-col gap-6">
                        {breakdownEntries.length > 0 && (
                          <div>
                            <div className="flex items-center justify-between mb-3">
                              <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider">{breakdownLabel}</h3>
                              <span className="bg-slate-200 text-slate-700 font-bold px-3 py-1 rounded-full text-sm">Total: {filteredForWarranty.length}</span>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                              {breakdownEntries.map(([name, count]) => (
                                <button 
                                  key={name} 
                                  onClick={() => handleBreakdownClick(name)} 
                                  className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4 text-left hover:border-blue-400 hover:shadow-md transition-all group w-full focus:outline-none focus:ring-2 focus:ring-blue-500"
                                >
                                  <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 flex-shrink-0 group-hover:bg-blue-50 transition-colors">
                                    {getIconForCategory(name, path[0], 24)}
                                  </div>
                                  <div className="min-w-0">
                                    <div className="text-[10px] sm:text-xs font-bold text-slate-500 uppercase truncate group-hover:text-blue-600 transition-colors" title={name}>{name}</div>
                                    <div className="text-xl sm:text-2xl font-bold text-slate-800">{count}</div>
                                  </div>
                                </button>
                              ))}
                            </div>
                          </div>
                        )}
                        <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider mt-2 border-t border-slate-200 pt-6">Warranty & Repair Diagnostics</h3>
                        <div className="grid md:grid-cols-2 gap-6">
                          <div className="border-2 border-[#5C6B42]/20 rounded-xl overflow-hidden shadow-sm flex flex-col h-full bg-[#5C6B42]/5">
                            <div className="bg-[#5C6B42]/10 p-4 border-b border-[#5C6B42]/20 flex items-center justify-between">
                              <h3 className="font-bold text-[#5C6B42] text-lg flex items-center gap-2"><ShieldCheck size={24} className="text-[#5C6B42]"/> Condition A: Covered</h3>
                              <span className="bg-[#5C6B42] text-white font-bold text-xl px-3 py-1 rounded-lg">{conditionA.length}</span>
                            </div>
                            <div className="p-5 flex-1">
                              <p className="text-sm text-slate-800 mb-4 bg-[#5C6B42]/10 p-3 rounded-lg border border-[#5C6B42]/20"><strong>Logic:</strong> Asset age is within its assigned warranty period (1, 2, or 3 years) from Purchase Date.</p>
                              <h4 className="font-semibold text-slate-800 mb-3 uppercase text-xs tracking-wider">Action Flow: Warranty Claim</h4>
                              <div className="space-y-3">
                                <div className="bg-white p-3 rounded-lg border border-[#5C6B42]/20 shadow-sm relative overflow-hidden">
                                  <div className="absolute left-0 top-0 bottom-0 w-1 bg-[#5C6B42]"></div>
                                  <div className="flex justify-between items-start mb-1">
                                    <span className="text-sm font-bold text-slate-800">EVALUATE / INVESTIGATE</span>
                                    {evalCount > 0 && <span className="bg-[#5C6B42]/20 text-[#5C6B42] text-[10px] font-bold px-2 py-0.5 rounded-full">{evalCount} Devices</span>}
                                  </div>
                                  <p className="text-xs text-slate-600 leading-relaxed">This indicates that the device has been filed for warranty claim evaluation and is subject to vendor physical inspection or pull-out assessment.</p>
                                </div>
                                <div className="bg-white p-3 rounded-lg border border-[#5C6B42]/20 shadow-sm relative overflow-hidden">
                                  <div className="absolute left-0 top-0 bottom-0 w-1 bg-[#5C6B42]"></div>
                                  <div className="flex justify-between items-start mb-1">
                                    <span className="text-sm font-bold text-slate-800">OUT FOR REPAIR</span>
                                    {repairCount > 0 && <span className="bg-[#5C6B42]/20 text-[#5C6B42] text-[10px] font-bold px-2 py-0.5 rounded-full">{repairCount} Devices</span>}
                                  </div>
                                  <p className="text-xs text-slate-600 leading-relaxed">This indicates that the device has already been pulled out and endorsed to the supplier/vendor for repair under warranty coverage.</p>
                                </div>
                              </div>
                            </div>
                          </div>
                          <div className="border-2 border-[#EE536B]/20 rounded-xl overflow-hidden shadow-sm flex flex-col h-full bg-[#EE536B]/5">
                            <div className="bg-[#EE536B]/10 p-4 border-b border-[#EE536B]/20 flex items-center justify-between">
                              <h3 className="font-bold text-[#EE536B] text-lg flex items-center gap-2"><ShieldAlert size={24} className="text-[#EE536B]"/> Condition B: Out of Warranty</h3>
                              <span className="bg-[#EE536B] text-white font-bold text-xl px-3 py-1 rounded-lg">{conditionB.length}</span>
                            </div>
                            <div className="p-5 flex-1">
                              <p className="text-sm text-slate-800 mb-4 bg-[#EE536B]/10 p-3 rounded-lg border border-[#EE536B]/20"><strong>Logic:</strong> Asset age exceeds its assigned warranty period OR Warranty explicitly Voided.</p>
                              <h4 className="font-semibold text-slate-800 mb-2 uppercase text-xs tracking-wider">Action Flow:</h4>
                              <div className="bg-white p-4 rounded-lg border border-[#EE536B]/20 shadow-sm mt-4 flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-[#EE536B]/10 flex items-center justify-center shrink-0"><HardDrive className="text-[#EE536B]" size={20}/></div>
                                <span className="text-sm font-bold text-[#EE536B]">Internal Repair or Vendor Quotation Request</span>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                </div>
                <div className="bg-white p-4 border-t border-slate-200 text-right">
                  <button onClick={() => setSelectedStatus(null)} className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">Close Summary</button>
                </div>
              </div>
            </div>
          )}

          {/* REPORTS TAB DRILLDOWN MODAL */}
          {reportDrilldown && activeTab === 'reports' && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={(e) => { if(e.target === e.currentTarget) setReportDrilldown(null) }}>
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl max-h-[90vh] overflow-hidden flex flex-col animate-in zoom-in-95 duration-200">
                <div className="bg-slate-800 p-6 text-white flex justify-between items-start">
                  <div>
                    <h2 className="text-2xl font-bold mb-1 flex items-center gap-2">Asset Inventory ({reportDrilldown.data.length})</h2>
                    <p className="text-slate-300 text-sm">Filter: {reportDrilldown.title}</p>
                  </div>
                  <button onClick={() => setReportDrilldown(null)} className="text-slate-400 hover:text-white bg-slate-700 hover:bg-slate-600 rounded-full p-2 transition-colors"><ArrowLeft size={20} /></button>
                </div>
                
                <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-end">
                  <div className="relative w-full sm:w-64">
                    <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16} />
                    <input type="text" placeholder="Search name, serial or model..." value={reportDrilldownSearch} onChange={(e) => setReportDrilldownSearch(e.target.value)} className="pl-9 pr-4 py-2 border border-slate-200 rounded-lg text-sm w-full focus:outline-none focus:ring-2 focus:ring-blue-500" />
                  </div>
                </div>

                <div className="p-0 overflow-x-auto overflow-y-auto flex-1 bg-white">
                  <table className="w-full text-sm text-left">
                    <thead className="bg-slate-100 text-slate-600 uppercase text-xs sticky top-0 z-10">
                      <tr><th className="px-6 py-3">Asset Name</th><th className="px-6 py-3">Serial Number</th><th className="px-6 py-3">Model</th><th className="px-6 py-3">Status</th><th className="px-6 py-3">Warranty</th></tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {reportDrilldown.data.filter(item => {
                        return reportDrilldownSearch === '' || 
                          (String(item.originalRow[8] || '')).toLowerCase().includes(reportDrilldownSearch.toLowerCase()) ||
                          String(item.model || '').toLowerCase().includes(reportDrilldownSearch.toLowerCase()) ||
                          String(item.assetName || '').toLowerCase().includes(reportDrilldownSearch.toLowerCase());
                      }).slice(0, 500).map((item, i) => (
                        <tr key={i} className="hover:bg-slate-50 transition-colors">
                          <td className="px-6 py-4 font-medium text-slate-800">{item.assetName}</td>
                          <td className="px-6 py-4 font-mono text-slate-500">{item.originalRow[8] || "N/A"}</td>
                          <td className="px-6 py-4">{item.model}</td>
                          <td className="px-6 py-4"><span className="bg-slate-100 text-slate-800 px-2 py-1 rounded text-xs font-bold border border-slate-200">{item.assignedSubStatus || item.primaryStatus}</span></td>
                          <td className="px-6 py-4">
                            {item.isCovered ? (
                              <span className="text-[#5C6B42] font-semibold flex items-center gap-1"><ShieldCheck size={14}/> Covered ({item.warrantyLimit}Y)</span>
                            ) : (
                              <div className="flex flex-col">
                                <span className="text-[#EE536B] font-semibold flex items-center gap-1"><ShieldAlert size={14}/> Out of Warranty ({item.warrantyLimit}Y)</span>
                                {item.isVoidedByDamage && <span className="text-[10px] text-[#EE536B]/80 font-bold uppercase mt-0.5 leading-tight">Voided (Broken)</span>}
                              </div>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  {reportDrilldown.data.length > 500 && (<div className="p-4 text-center text-xs text-slate-500 bg-slate-50 border-t border-slate-100">Showing first 500 items.</div>)}
                  {reportDrilldown.data.length === 0 && (<div className="p-10 text-center text-sm text-slate-500 bg-white">No assets found matching this criteria.</div>)}
                </div>
                <div className="bg-white p-4 border-t border-slate-200 text-right">
                  <button onClick={() => setReportDrilldown(null)} className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">Close</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><Dashboard /></ErrorBoundary>);
  </script>
</body>
</html>
