<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IT Asset Catalog System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
  <div id="root">
    <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; font-family:sans-serif; color:#475569;">
      <div style="font-size: 1.5rem; margin-bottom: 1rem;">Loading IT Asset System...</div>
    </div>
  </div>

  <!-- Data Vaults (Empty on load, populated on export) -->
  <script id="data-raw" type="application/json"></script>
  <script id="data-headers" type="application/json"></script>

  <!-- Main Application Source -->
  <script type="text/babel" data-presets="react,env" id="app-source">
    const { useState, useMemo, useCallback, useEffect } = React;

    const CATEGORY_ORDER = {
      'Desktop': 1,
      'Laptop': 2,
      'Monitor': 3,
      'Headsets': 4,
      'Headset Adapter': 5,
      'Accessories & Others': 6
    };

    // --- FULLY OFFLINE INLINE SVGS ---
    const SvgIcon = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const Upload = (p) => <SvgIcon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></SvgIcon>;
    const Download = (p) => <SvgIcon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></SvgIcon>;
    const ChevronRight = (p) => <SvgIcon {...p}><polyline points="9 18 15 12 9 6"/></SvgIcon>;
    const Monitor = (p) => <SvgIcon {...p}><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></SvgIcon>;
    const Headphones = (p) => <SvgIcon {...p}><path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a9 9 0 0 1 18 0v7a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/></SvgIcon>;
    const Laptop = (p) => <SvgIcon {...p}><path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0 1.28 2.55a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45L4 16"/></SvgIcon>;
    const HardDrive = (p) => <SvgIcon {...p}><line x1="22" x2="2" y1="12" y2="12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><line x1="6" x2="6.01" y1="16" y2="16"/><line x1="10" x2="10.01" y1="16" y2="16"/></SvgIcon>;
    const FileSpreadsheet = (p) => <SvgIcon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></SvgIcon>;
    const ShieldAlert = (p) => <SvgIcon {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></SvgIcon>;
    const ShieldCheck = (p) => <SvgIcon {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></SvgIcon>;
    const ArrowLeft = (p) => <SvgIcon {...p}><line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/></SvgIcon>;
    const Info = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></SvgIcon>;
    const Activity = (p) => <SvgIcon {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></SvgIcon>;
    const Search = (p) => <SvgIcon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></SvgIcon>;
    const MapPin = (p) => <SvgIcon {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></SvgIcon>;
    const LayoutDashboard = (p) => <SvgIcon {...p}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></SvgIcon>;
    const FileText = (p) => <SvgIcon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></SvgIcon>;

    // --- ROBUST CSV PARSER ---
    const parseCSV = (str) => {
      const arr = [];
      let quote = false;
      let col = 0, row = 0;
      arr[row] = [];
      for (let c = 0; c < str.length; c++) {
        let cc = str[c], nc = str[c+1];
        arr[row] = arr[row] || [];
        arr[row][col] = arr[row][col] || '';
        if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
        if (cc === '"') { quote = !quote; continue; }
        if (cc === ',' && !quote) { ++col; continue; }
        if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
        if (cc === '\n' && !quote) { ++row; col = 0; continue; }
        if (cc === '\r' && !quote) { ++row; col = 0; continue; }
        arr[row][col] += cc;
      }
      if (arr.length > 0 && arr[arr.length - 1].length === 1 && arr[arr.length - 1][0] === '') {
        arr.pop();
      }
      return arr;
    };

    const getStatColorClasses = (color) => {
      const maps = {
        green: { border: "border-green-200 hover:border-green-400", text: "text-green-500", textDark: "text-green-900", icon: "text-green-300" },
        slate: { border: "border-slate-200 hover:border-slate-400", text: "text-slate-500", textDark: "text-slate-900", icon: "text-slate-300" },
        orange: { border: "border-orange-200 hover:border-orange-400", text: "text-orange-500", textDark: "text-orange-900", icon: "text-orange-300" },
        emerald: { border: "border-emerald-200 hover:border-emerald-400", text: "text-emerald-500", textDark: "text-emerald-900", icon: "text-emerald-300" },
        teal: { border: "border-teal-200 hover:border-teal-400", text: "text-teal-500", textDark: "text-teal-900", icon: "text-teal-300" },
        red: { border: "border-red-200 hover:border-red-400", text: "text-red-500", textDark: "text-red-900", icon: "text-red-300" }
      };
      return maps[color] || maps.slate;
    };

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, info: null };
      }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, info) {
        console.error("Dashboard caught an error:", error, info);
        this.setState({ info });
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen bg-red-50 flex items-center justify-center p-6 text-red-900 font-sans">
              <div className="bg-white p-8 rounded-xl shadow-2xl max-w-3xl w-full border-t-4 border-red-600">
                <h1 className="text-2xl font-bold mb-2 flex items-center gap-2 text-red-700">
                  <ShieldAlert size={28} /> Application Halted
                </h1>
                <p className="mb-6 text-slate-600">The dashboard encountered unexpected data or an error that prevented it from rendering. Don't worry—your data is safe.</p>
                <div className="bg-red-50 p-4 rounded-lg overflow-auto text-xs font-mono text-red-800 border border-red-100 max-h-64">
                  <strong>{this.state.error?.toString()}</strong><br/>{this.state.info?.componentStack}
                </div>
                <button onClick={() => window.location.reload()} className="mt-6 bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg font-medium shadow-sm transition-colors">
                  Reload Dashboard
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function Dashboard() {
      // Safe Hydration from Data Vaults & Session Storage (Persists on Refresh)
      const [rawData, setRawData] = useState(() => {
        const el = document.getElementById('data-raw');
        if (el && el.textContent.trim()) return JSON.parse(el.textContent);
        try {
          const saved = sessionStorage.getItem('itAssetData');
          if (saved) return JSON.parse(saved);
        } catch(e) {}
        return [];
      });
      const [headers, setHeaders] = useState(() => {
        const el = document.getElementById('data-headers');
        if (el && el.textContent.trim()) return JSON.parse(el.textContent);
        try {
          const saved = sessionStorage.getItem('itAssetHeaders');
          if (saved) return JSON.parse(saved);
        } catch(e) {}
        return [];
      });
      
      const [activeTab, setActiveTab] = useState('dashboard');
      const [path, setPath] = useState([]); 
      const [selectedStatus, setSelectedStatus] = useState(null); 
      const [expandedAssigned, setExpandedAssigned] = useState(false);
      const [inventorySearch, setInventorySearch] = useState('');
      const [inventoryStatusFilter, setInventoryStatusFilter] = useState('ALL');
      const [selectedLocation, setSelectedLocation] = useState('ALL'); 

      // Reports Filter States
      const TODAY = new Date('2026-05-27'); 
      const [reportDateType, setReportDateType] = useState('ALL_TIME');
      const [reportStart, setReportStart] = useState('2026-01-01');
      const [reportEnd, setReportEnd] = useState(TODAY.toISOString().split('T')[0]);

      const [reportDrilldown, setReportDrilldown] = useState(null);
      const [reportDrilldownSearch, setReportDrilldownSearch] = useState('');

      const enrichedData = useMemo(() => {
        if (!rawData || rawData.length === 0) return [];
        
        const assetNameIdx = headers.findIndex(h => String(h || '').toLowerCase().trim() === 'asset name');

        return rawData.map((row, index) => {
          const modelStr = String(row[4] || '').toUpperCase();
          const categoryCol = String(row[6] || '').toUpperCase();
          const purchaseDateStr = String(row[9] || '');
          const locationStr = String(row[26] || '').trim() || 'Unassigned';
          const warrantyText = String(row[12] || '').toUpperCase();
          const rawStatusStr = String(row[46] || '').toUpperCase();

          const looksLikeMonitor = modelStr.includes('MONITOR') || modelStr.includes('E2219HN');
          const isMonitor = categoryCol.includes('MONITOR') || looksLikeMonitor;
          
          const isAdapter = (categoryCol.includes('HEADSET') && categoryCol.includes('ADAPTER')) || 
                            (modelStr.includes('HEADSET') && modelStr.includes('ADAPTER')) || 
                            (modelStr.includes('JABRA') && modelStr.includes('LINK'));
                            
          const looksLikeHeadset = !isAdapter && (categoryCol.includes('HEADSET') || /HEADSET|JABRA|BIZ|ADDASOUND|EVOLVE|EPIC/.test(modelStr));

          const isPhone = categoryCol === 'PHONES' || categoryCol === 'PHONE';

          const looksLikeComputer = /MACBOOK|OPTIPLEX|THINKPAD|LATITUDE|PROBOOK|VOSTRO|NITRO|HELIOS|TRAVELMATE/.test(modelStr);
          const isComputer = !isMonitor && !isAdapter && !looksLikeHeadset && !isPhone && (categoryCol.includes('LAPTOP') || categoryCol.includes('DESKTOP') || categoryCol.includes('COMPUTER') || categoryCol.includes('MAC') || looksLikeComputer);

          let mainCat = 'Accessories & Others';
          let matchedModel = row[4] || 'Unknown Model';
          let assetName = assetNameIdx > -1 ? (row[assetNameIdx] || 'Unknown Name') : (row[3] || 'Unknown Name');
          let drilldownPath = [];

          if (isComputer) {
            if (categoryCol.includes('DESKTOP') || modelStr.includes('OPTIPLEX') || modelStr.includes('DESKTOP') || modelStr.includes('MICRO')) {
              mainCat = 'Desktop';
              drilldownPath = [mainCat, 'Windows', 'Desktop', matchedModel];
            } else {
              mainCat = 'Laptop';
              if (categoryCol.includes('MAC') || modelStr.includes('MACBOOK') || modelStr.includes('MAC')) {
                drilldownPath = [mainCat, 'MacOS', 'MacBook', matchedModel];
              } else {
                drilldownPath = [mainCat, 'Windows', 'Laptop', matchedModel];
              }
            }
          } else if (isMonitor) {
            mainCat = 'Monitor';
            let size = 'Others';
            if (modelStr.includes('24')) size = '24-inch';
            else if (modelStr.includes('22') || modelStr.includes('E2219HN')) size = '22-inch';
            drilldownPath = [mainCat, size, matchedModel];
          } else if (isPhone) {
            mainCat = 'Accessories & Others';
            const assetNameStr = String(assetName || '').toUpperCase();
            const searchStr = `${modelStr} ${assetNameStr}`;
            
            let os = 'Android'; // Changed default from 'Others' to 'Android'
            if (searchStr.includes('IPHONE')) {
              os = 'IOS';
            } else if (searchStr.includes('ANDROID') && !searchStr.includes('TV')) {
              os = 'Android';
            }
            
            drilldownPath = [mainCat, 'Phones', os, matchedModel];
          } else if (isAdapter) {
            mainCat = 'Headset Adapter';
            drilldownPath = [mainCat, matchedModel];
          } else if (!isAdapter && (categoryCol.includes('HEADSET') || /HEADSET|JABRA|BIZ|ADDASOUND|EVOLVE|EPIC/.test(modelStr))) {
            mainCat = 'Headsets';
            let conn = modelStr.includes('USB-C') ? 'USB-C' : 'USB-A';
            drilldownPath = [mainCat, conn, matchedModel];
          } else {
            mainCat = 'Accessories & Others';
            let subCat = 'Uncategorized';
            if (categoryCol) {
              subCat = categoryCol.charAt(0).toUpperCase() + categoryCol.slice(1).toLowerCase();
            }
            drilldownPath = [mainCat, subCat, matchedModel];
          }

          let primaryStatus = 'OTHER';
          let assignedSubStatus = null;
          let damageStatus = null;

          if (rawStatusStr.includes('EVALUATE') || rawStatusStr.includes('INVESTIGATE')) {
            primaryStatus = 'EVALUATE / INVESTIGATE';
            damageStatus = 'EVALUATE / INVESTIGATE';
          } else if (rawStatusStr.includes('OUT FOR REPAIR')) {
            primaryStatus = 'OUT FOR REPAIR';
            damageStatus = 'OUT FOR REPAIR';
          } else if (rawStatusStr.includes('READY FOR ASSIGNMENT')) {
            primaryStatus = 'READY FOR ASSIGNMENT';
          } else if (rawStatusStr.includes('DISPOSAL')) {
            primaryStatus = 'READY FOR DISPOSAL';
          } else if (rawStatusStr.includes('LOST') || rawStatusStr.includes('STOLEN')) {
            primaryStatus = 'LOST OR STOLEN';
          } else if (rawStatusStr.includes('BROKEN') && rawStatusStr.includes('DEPLOYABLE')) {
            primaryStatus = 'BROKEN (DEPLOYABLE)';
          } else if (rawStatusStr.includes('ASSIGNED') || rawStatusStr.includes('DEPLOYED') || rawStatusStr.includes('CHECKED OUT')) {
            primaryStatus = 'ASSIGNED';
            if (rawStatusStr.includes('BROKEN')) {
              assignedSubStatus = 'BROKEN (DEPLOYED)';
            } else {
              assignedSubStatus = 'ASSIGNED';
            }
          }

          // DYNAMIC WARRANTY LOGIC
          let warrantyLimit = 1;
          const isMeetingEq = categoryCol.includes('MEETING') || categoryCol.includes('CHROMEBOOK') || modelStr.includes('CHROMEBOOK');
          const isHeadsetOrAdapterCheck = mainCat === 'Headsets' || mainCat === 'Headset Adapter';

          if (mainCat === 'Desktop' || mainCat === 'Laptop' || mainCat === 'Monitor' || isMeetingEq) {
            warrantyLimit = 3;
          } else if (isHeadsetOrAdapterCheck) {
            warrantyLimit = 2;
          }

          let isCovered = false;
          let ageInYears = 0;
          let isVoidedByDamage = rawStatusStr.includes('BROKEN');

          if (purchaseDateStr) {
            const pDate = new Date(purchaseDateStr);
            if (!isNaN(pDate)) {
              const ageInMs = TODAY - pDate;
              ageInYears = ageInMs / (1000 * 60 * 60 * 24 * 365.25);
              if (warrantyText === 'VOID' || isVoidedByDamage) {
                isCovered = false;
              } else {
                isCovered = ageInYears < warrantyLimit;
              }
            }
          } else if (isVoidedByDamage) {
             isCovered = false;
          }

          return {
            _id: index,
            assetName: assetName,
            mainCategory: mainCat,
            model: matchedModel,
            drilldownPath: drilldownPath,
            location: locationStr,
            primaryStatus: primaryStatus,
            assignedSubStatus: assignedSubStatus,
            damageStatus: damageStatus,
            isCovered: isCovered,
            isVoidedByDamage: isVoidedByDamage,
            warrantyLimit: warrantyLimit,
            rawCategory: categoryCol || 'Uncategorized',
            purchaseDate: purchaseDateStr,
            originalRow: row
          };
        });
      }, [rawData, headers]);

      const availableLocations = useMemo(() => {
        const locs = new Set(enrichedData.map(item => item.location));
        return Array.from(locs).sort();
      }, [enrichedData]);

      const filteredData = useMemo(() => {
        return enrichedData.filter(item => {
          if (selectedLocation !== 'ALL' && item.location !== selectedLocation) return false;
          for (let i = 0; i < path.length; i++) {
            if (item.drilldownPath[i] !== path[i]) return false;
          }
          return true;
        });
      }, [enrichedData, path, selectedLocation]);

      // --- REPORTS TAB SPECIFIC FILTERING ---
      const reportFilteredData = useMemo(() => {
        if (reportDateType === 'ALL_TIME') return filteredData;

        const checkinIdx = headers.findIndex(h => {
          const lowerH = String(h || '').toLowerCase().trim();
          return lowerH === 'last checkin date' || lowerH.includes('last checkin');
        });
        const checkoutIdx = headers.findIndex(h => {
          const lowerH = String(h || '').toLowerCase().trim();
          return lowerH === 'checkout date' || lowerH.includes('checkout');
        });
        const eolIdx = headers.findIndex(h => String(h || '').toLowerCase().includes('eol'));
        const statusIdx = headers.findIndex(h => String(h || '').toLowerCase().trim() === 'status');

        return filteredData.filter(item => {
          let targetDateStr = null;
          let isValidStatus = true;
          
          const rawStatusLower = String(item.originalRow[statusIdx > -1 ? statusIdx : 46] || '').toLowerCase(); 

          if (reportDateType === 'PURCHASE_DATE') {
            targetDateStr = item.purchaseDate;
          } else if (reportDateType === 'CHECK_IN') {
            targetDateStr = checkinIdx > -1 ? item.originalRow[checkinIdx] : null;
            isValidStatus = rawStatusLower.includes('deployable');
          } else if (reportDateType === 'CHECK_OUT') {
            targetDateStr = checkoutIdx > -1 ? item.originalRow[checkoutIdx] : null;
            isValidStatus = rawStatusLower.includes('deployed');
          } else if (reportDateType === 'EOL') {
            targetDateStr = eolIdx > -1 ? item.originalRow[eolIdx] : null;
          }

          if (!isValidStatus || !targetDateStr) return false;

          const pDate = new Date(targetDateStr);
          if (isNaN(pDate)) return false;
          
          const start = reportStart ? new Date(reportStart) : new Date('2000-01-01');
          const end = reportEnd ? new Date(reportEnd) : new Date('2100-01-01');
          end.setHours(23, 59, 59, 999); 
          
          return pDate >= start && pDate <= end;
        });
      }, [filteredData, reportDateType, reportStart, reportEnd, headers]);

      const stats = useMemo(() => {
        const counts = {
          total: filteredData.length,
          'READY FOR ASSIGNMENT': 0, 'READY FOR ASSIGNMENT_covered': 0,
          'READY FOR DISPOSAL': 0, 'READY FOR DISPOSAL_covered': 0,
          'LOST OR STOLEN': 0, 'LOST OR STOLEN_covered': 0,
          'BROKEN (DEPLOYABLE)': 0, 'BROKEN (DEPLOYABLE)_covered': 0,
          'EVALUATE / INVESTIGATE': 0, 'EVALUATE / INVESTIGATE_covered': 0,
          'OUT FOR REPAIR': 0, 'OUT FOR REPAIR_covered': 0,
          'ASSIGNED_TOTAL': 0, 'ASSIGNED_TOTAL_covered': 0,
          'ASSIGNED_CLEAN': 0, 'ASSIGNED_CLEAN_covered': 0,
          'ASSIGNED_BROKEN': 0, 'ASSIGNED_BROKEN_covered': 0,
          'OTHER': 0, 'OTHER_covered': 0
        };

        filteredData.forEach(item => {
          if (item.primaryStatus === 'ASSIGNED') {
            counts['ASSIGNED_TOTAL']++;
            if (item.isCovered) counts['ASSIGNED_TOTAL_covered']++;
            
            if (item.assignedSubStatus === 'BROKEN (DEPLOYED)') {
              counts['ASSIGNED_BROKEN']++;
              if (item.isCovered) counts['ASSIGNED_BROKEN_covered']++;
            } else {
              counts['ASSIGNED_CLEAN']++;
              if (item.isCovered) counts['ASSIGNED_CLEAN_covered']++;
            }
          } else {
            if (counts[item.primaryStatus] !== undefined) {
              counts[item.primaryStatus]++;
              if (item.isCovered) counts[item.primaryStatus + '_covered']++;
            } else {
              counts['OTHER']++;
              if (item.isCovered) counts['OTHER_covered']++;
            }
          }
        });
        return counts;
      }, [filteredData]);

      const availableStatuses = useMemo(() => {
        const statuses = new Set(filteredData.map(item => item.assignedSubStatus || item.primaryStatus));
        return Array.from(statuses).sort();
      }, [filteredData]);

      const tableData = useMemo(() => {
        return filteredData.filter(item => {
          const matchesSearch = inventorySearch === '' || 
            (String(item.originalRow[8] || '')).toLowerCase().includes(inventorySearch.toLowerCase()) ||
            String(item.model || '').toLowerCase().includes(inventorySearch.toLowerCase()) ||
            String(item.assetName || '').toLowerCase().includes(inventorySearch.toLowerCase());
            
          const itemStatus = item.assignedSubStatus || item.primaryStatus;
          const matchesStatus = inventoryStatusFilter === 'ALL' || itemStatus === inventoryStatusFilter;
          
          return matchesSearch && matchesStatus;
        });
      }, [filteredData, inventorySearch, inventoryStatusFilter]);

      // --- REPORT GENERATION HELPERS ---
      const generateReportSummary = useCallback((data, keySelector) => {
        const map = {};
        data.forEach(item => {
          const key = keySelector(item) || 'Unknown';
          if (!map[key]) {
            map[key] = { count: 0, covered: 0, outOfWty: 0, assigned: 0, brokenDeployed: 0, readyAssign: 0, readyDispose: 0, evaluate: 0, repair: 0, lost: 0, serials: [], mainCategory: item.mainCategory };
          }
          map[key].count++;
          const serial = String(item.originalRow[8] || '').trim() || 'N/A';
          map[key].serials.push(serial);

          if (item.isCovered) map[key].covered++; else map[key].outOfWty++;

          const status = item.assignedSubStatus || item.primaryStatus;
          if (status === 'ASSIGNED') map[key].assigned++;
          if (status === 'BROKEN (DEPLOYED)') map[key].brokenDeployed++;
          if (status === 'READY FOR ASSIGNMENT') map[key].readyAssign++;
          if (status === 'READY FOR DISPOSAL') map[key].readyDispose++;
          if (status === 'EVALUATE / INVESTIGATE') map[key].evaluate++;
          if (status === 'OUT FOR REPAIR') map[key].repair++;
          if (status === 'LOST OR STOLEN') map[key].lost++;
        });
        return Object.entries(map).map(([name, stats]) => ({ name, ...stats }));
      }, []);

      const reportMetrics = useMemo(() => {
        return {
          total: reportFilteredData.length,
          uniqueModels: new Set(reportFilteredData.map(d => d.model)).size,
          totalCategories: new Set(reportFilteredData.map(d => d.mainCategory)).size,
          covered: reportFilteredData.filter(d => d.isCovered).length,
          outOfWty: reportFilteredData.filter(d => !d.isCovered).length,
        };
      }, [reportFilteredData]);

      const reportLocations = useMemo(() => {
        const locs = {};
        reportFilteredData.forEach(item => {
          locs[item.location] = (locs[item.location] || 0) + 1;
        });
        return Object.entries(locs).map(([name, count]) => ({ name, count })).sort((a,b) => b.count - a.count);
      }, [reportFilteredData]);

      const reportCategories = useMemo(() => {
        const res = generateReportSummary(reportFilteredData, i => i.mainCategory);
        return res.sort((a, b) => (CATEGORY_ORDER[a.name] || 99) - (CATEGORY_ORDER[b.name] || 99));
      }, [reportFilteredData, generateReportSummary]);

      const reportModels = useMemo(() => {
        const res = generateReportSummary(reportFilteredData, i => i.model);
        return res.sort((a, b) => {
          const catDiff = (CATEGORY_ORDER[a.mainCategory] || 99) - (CATEGORY_ORDER[b.mainCategory] || 99);
          if (catDiff !== 0) return catDiff;
          return b.count - a.count;
        });
      }, [reportFilteredData, generateReportSummary]);

      // Dynamically hide empty columns for Check-In / Check-Out filters
      const isCheckInOut = reportDateType === 'CHECK_IN' || reportDateType === 'CHECK_OUT';
      const showAssigned = !isCheckInOut || reportCategories.some(c => c.assigned > 0);
      const showBrokenDeployed = !isCheckInOut || reportCategories.some(c => c.brokenDeployed > 0);
      const showReadyAssign = !isCheckInOut || reportCategories.some(c => c.readyAssign > 0);
      const showReadyDispose = !isCheckInOut || reportCategories.some(c => c.readyDispose > 0);
      const showEvaluate = !isCheckInOut || reportCategories.some(c => c.evaluate > 0);
      const showRepair = !isCheckInOut || reportCategories.some(c => c.repair > 0);
      const showLost = !isCheckInOut || reportCategories.some(c => c.lost > 0);

      const handleReportCellClick = (type, rowName, columnType, label) => {
        let filtered = reportFilteredData;

        if (type === 'category') {
          filtered = filtered.filter(d => d.mainCategory === rowName);
        } else if (type === 'model') {
          filtered = filtered.filter(d => d.model === rowName);
        } else if (type === 'location') {
          filtered = filtered.filter(d => d.location === rowName);
        }

        if (columnType === 'covered') filtered = filtered.filter(d => d.isCovered);
        if (columnType === 'outOfWty') filtered = filtered.filter(d => !d.isCovered);
        if (columnType === 'assigned') filtered = filtered.filter(d => (d.assignedSubStatus || d.primaryStatus) === 'ASSIGNED');
        if (columnType === 'brokenDeployed') filtered = filtered.filter(d => (d.assignedSubStatus || d.primaryStatus) === 'BROKEN (DEPLOYED)');
        if (columnType === 'readyAssign') filtered = filtered.filter(d => (d.assignedSubStatus || d.primaryStatus) === 'READY FOR ASSIGNMENT');
        if (columnType === 'readyDispose') filtered = filtered.filter(d => (d.assignedSubStatus || d.primaryStatus) === 'READY FOR DISPOSAL');
        if (columnType === 'evaluate') filtered = filtered.filter(d => (d.assignedSubStatus || d.primaryStatus) === 'EVALUATE / INVESTIGATE');
        if (columnType === 'repair') filtered = filtered.filter(d => (d.assignedSubStatus || d.primaryStatus) === 'OUT FOR REPAIR');
        if (columnType === 'lost') filtered = filtered.filter(d => (d.assignedSubStatus || d.primaryStatus) === 'LOST OR STOLEN');

        setReportDrilldown({
          title: `${rowName === 'ALL' ? 'Total Assets' : rowName} - ${label}`,
          data: filtered
        });
        setReportDrilldownSearch('');
      };

      const renderCell = (val, onClick, className) => {
        if (!val) return <td className={className}>0</td>;
        return (
          <td className={className}>
            <button onClick={onClick} className="hover:underline hover:text-blue-600 transition-colors cursor-pointer focus:outline-none">
              {val}
            </button>
          </td>
        );
      };

      const processFile = (file) => {
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const text = evt.target.result;
            const parsed = parseCSV(text);
            if (parsed.length > 1) {
              const newHeaders = parsed[0];
              const newData = parsed.slice(1);
              setHeaders(newHeaders);
              setRawData(newData);
              setPath([]);
              setSelectedStatus(null);
              setExpandedAssigned(false);
              setInventorySearch('');
              setInventoryStatusFilter('ALL');
              setActiveTab('dashboard');
              try {
                sessionStorage.setItem('itAssetHeaders', JSON.stringify(newHeaders));
                sessionStorage.setItem('itAssetData', JSON.stringify(newData));
              } catch (err) {
                console.warn("File too large for session storage. Data won't persist on refresh.");
              }
            }
          } catch (err) {
            alert("Failed to parse CSV file. Ensure it is a valid Snipe-IT export.");
          }
        };
        reader.readAsText(file);
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (file) processFile(file);
        e.target.value = null;
      };

      const handleFileUploadInline = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (rawData.length > 0 && !window.confirm("Are you sure you want to replace the current data with a new file?")) {
          e.target.value = null;
          return;
        }
        processFile(file);
        e.target.value = null;
      };

      const handleReset = () => {
        if (window.confirm("Are you sure you want to completely clear all data?")) {
          setRawData([]);
          setHeaders([]);
          setPath([]);
          setSelectedStatus(null);
          setExpandedAssigned(false);
          setInventorySearch('');
          setInventoryStatusFilter('ALL');
          setActiveTab('dashboard');
          try {
            sessionStorage.removeItem('itAssetData');
            sessionStorage.removeItem('itAssetHeaders');
          } catch(e) {}
        }
      };

      const drillDown = (value) => {
        setPath([...path, value]);
        setSelectedStatus(null);
        setExpandedAssigned(false);
        setInventorySearch('');
      };

      const navigateUp = (index) => {
        setPath(path.slice(0, index));
        setSelectedStatus(null);
        setExpandedAssigned(false);
        setInventorySearch('');
        if (index === 0) {
          setInventoryStatusFilter('ALL');
        }
      };

      const handleBreakdownClick = (categoryName) => {
        let statusFilter = selectedStatus;
        if (selectedStatus === 'ASSIGNED_CLEAN') statusFilter = 'ASSIGNED';
        if (selectedStatus === 'ASSIGNED_BROKEN') statusFilter = 'BROKEN (DEPLOYED)';
        
        setPath([...path, categoryName]);
        setSelectedStatus(null);
        setExpandedAssigned(false);
        setInventorySearch('');
        setInventoryStatusFilter(statusFilter);
      };

      // --- OFFLINE EXPORT LOGIC FOR DASHBOARD ---
      const triggerExport = () => {
        if (!filteredData.length) return;
        if (window.__IS_EXPORTED_SNAPSHOT__) {
          alert("You are already viewing the exported snapshot!");
          return;
        }

        const safeRawData = JSON.stringify(rawData).replace(/</g, '\\u003c');
        const safeHeaders = JSON.stringify(headers).replace(/</g, '\\u003c');
        const reactScript = document.getElementById("app-source").textContent;

        const htmlContent = [
          '<!DOCTYPE html>',
          '<html lang="en">',
          '<head>',
          '  <meta charset="UTF-8">',
          '  <title>IT Asset Snapshot (Interactive)</title>',
          '  <script src="https://cdn.tailwindcss.com"><' + '/script>',
          '  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"><' + '/script>',
          '  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"><' + '/script>',
          '  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"><' + '/script>',
          '  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"><' + '/script>',
          '  <script>',
          '    window.__IS_EXPORTED_SNAPSHOT__ = true;',
          '  <' + '/script>',
          '</head>',
          '<body class="bg-slate-50 text-slate-800 font-sans">',
          '  <div id="root">',
          '    <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; font-family:sans-serif; color:#475569;">',
          '      <div style="font-size: 1.5rem; margin-bottom: 1rem;">Loading Interactive Dashboard...</div>',
          '    </div>',
          '  </div>',
          '  <script id="data-raw" type="application/json">' + safeRawData + '<' + '/script>',
          '  <script id="data-headers" type="application/json">' + safeHeaders + '<' + '/script>',
          '  <script type="text/babel" data-presets="react,env" id="app-source">',
          reactScript,
          '  <' + '/script>',
          '</body>',
          '</html>'
        ].join('\n');

        const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.setAttribute('href', url);
        link.setAttribute('download', 'IT_Asset_Interactive_Report.html');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // --- EXPORT EXCEL FOR REPORTS TAB ---
      const exportReportsExcel = () => {
        if (!window.XLSX) {
          alert("Excel export library is loading. Please try again in a few seconds.");
          return;
        }

        const headerStyle = {
          font: { bold: true, color: { rgb: "FFFFFF" } },
          fill: { fgColor: { rgb: "5C6B42" }, patternType: "solid" }
        };

        const createHeaderCell = (value) => ({ v: value, t: "s", s: headerStyle });
        const summaryData = [];

        // 1. Metrics
        summaryData.push(['Metric', 'Value'].map(createHeaderCell));
        summaryData.push(['Total Assets', reportMetrics.total]);
        summaryData.push(['Models', reportMetrics.uniqueModels]);
        summaryData.push(['Total Categories', reportMetrics.totalCategories]);
        summaryData.push(['Assets (Covered by Warranty)', reportMetrics.covered]);
        summaryData.push(['Assets (Out of Warranty)', reportMetrics.outOfWty]);
        summaryData.push([]); 

        // 2. Locations
        summaryData.push([{v: 'Location Summary', s: { font: { bold: true, sz: 14 } }}]);
        summaryData.push(['Default Location', 'Count'].map(createHeaderCell));
        reportLocations.forEach(loc => {
          summaryData.push([loc.name, loc.count]);
        });
        summaryData.push([]); 

        // Setup Dynamic Headers
        const dynamicHeaders = [];
        if (showAssigned) dynamicHeaders.push('Assigned');
        if (showBrokenDeployed) dynamicHeaders.push('Broken (Deployed)');
        if (showReadyAssign) dynamicHeaders.push('Ready for Assignment');
        if (showReadyDispose) dynamicHeaders.push('Ready for Disposal');
        if (showEvaluate) dynamicHeaders.push('Evaluate / Investigate');
        if (showRepair) dynamicHeaders.push('Out for Repair');
        if (showLost) dynamicHeaders.push('Lost or Stolen');
        
        // 3. Category Summary
        const catHeaders = ["Category", "Count", "Covered by Wty", "Out of Wty", ...dynamicHeaders];
        summaryData.push([{v: 'Category Summary', s: { font: { bold: true, sz: 14 } }}]);
        summaryData.push(catHeaders.map(createHeaderCell));
        reportCategories.forEach(c => {
          const row = [c.name, c.count, c.covered, c.outOfWty];
          if (showAssigned) row.push(c.assigned);
          if (showBrokenDeployed) row.push(c.brokenDeployed);
          if (showReadyAssign) row.push(c.readyAssign);
          if (showReadyDispose) row.push(c.readyDispose);
          if (showEvaluate) row.push(c.evaluate);
          if (showRepair) row.push(c.repair);
          if (showLost) row.push(c.lost);
          summaryData.push(row);
        });
        summaryData.push([]); 

        // 4. Model Summary
        const modHeaders = ["Category", "Model", "Count", "Covered by Wty", "Out of Wty", ...dynamicHeaders];
        summaryData.push([{v: 'Model Summary', s: { font: { bold: true, sz: 14 } }}]);
        summaryData.push(modHeaders.map(createHeaderCell));
        reportModels.forEach(m => {
          const row = [m.mainCategory, m.name, m.count, m.covered, m.outOfWty];
          if (showAssigned) row.push(m.assigned);
          if (showBrokenDeployed) row.push(m.brokenDeployed);
          if (showReadyAssign) row.push(m.readyAssign);
          if (showReadyDispose) row.push(m.readyDispose);
          if (showEvaluate) row.push(m.evaluate);
          if (showRepair) row.push(m.repair);
          if (showLost) row.push(m.lost);
          summaryData.push(row);
        });

        // 5. Build Asset Inventory Sheet Data (Tab 2)
        const inventoryData = [];
        inventoryData.push(["Asset Name", "Serial Number", "Category", "Model", "Status", "Location", "Warranty", "Purchase Date"].map(createHeaderCell));
        
        // Sorting Logic for Asset Inventory Focus
        const statusSortOrder = {
          'READY FOR ASSIGNMENT': 1,
          'READY FOR DISPOSAL': 2,
          'BROKEN (DEPLOYABLE)': 3,
          'BROKEN (DEPLOYED)': 4,
          'EVALUATE / INVESTIGATE': 5,
        };

        const sortedInventory = [...reportFilteredData].sort((a, b) => {
          const statA = a.assignedSubStatus || a.primaryStatus || '';
          const statB = b.assignedSubStatus || b.primaryStatus || '';
          const rankA = statusSortOrder[statA] || 99;
          const rankB = statusSortOrder[statB] || 99;
          
          if (rankA !== rankB) return rankA - rankB;
          
          const catDiff = (CATEGORY_ORDER[a.mainCategory] || 99) - (CATEGORY_ORDER[b.mainCategory] || 99);
          if (catDiff !== 0) return catDiff;
          
          return (a.model || '').localeCompare(b.model || '');
        });

        sortedInventory.forEach(item => {
          inventoryData.push([
            item.assetName || "N/A",
            item.originalRow[8] || "N/A",
            item.mainCategory || "N/A",
            item.model || "N/A",
            item.assignedSubStatus || item.primaryStatus || "N/A",
            item.location || "N/A",
            item.isCovered ? `Covered (${item.warrantyLimit}Y)` : `Out of Warranty (${item.warrantyLimit}Y)`,
            item.purchaseDate || "N/A"
          ]);
        });

        // 6. Generate Workbook using SheetJS
        const wb = window.XLSX.utils.book_new();
        const wsSummary = window.XLSX.utils.aoa_to_sheet(summaryData);
        const wsInventory = window.XLSX.utils.aoa_to_sheet(inventoryData);

        const wscolsSummary = [{wch: 25}, {wch: 25}, {wch: 15}, {wch: 15}, {wch: 15}, {wch: 20}, {wch: 15}];
        const wscolsInventory = [{wch: 35}, {wch: 25}, {wch: 25}, {wch: 25}, {wch: 15}, {wch: 20}, {wch: 20}, {wch: 15}];
        wsSummary['!cols'] = wscolsSummary;
        wsInventory['!cols'] = wscolsInventory;

        window.XLSX.utils.book_append_sheet(wb, wsSummary, "Summary Dashboard");
        window.XLSX.utils.book_append_sheet(wb, wsInventory, "Asset Inventory");

        const fileName = `IT_Asset_Report_${reportDateType === 'ALL_TIME' ? 'All_Time' : reportStart + '_to_' + reportEnd}.xlsx`;
        window.XLSX.writeFile(wb, fileName);
      };

      const getNextLevelOptions = () => {
        const optionsMap = {}; 
        const levelIndex = path.length; 
        let hasNextLevel = false;
        
        tableData.forEach(item => {
          if (item.drilldownPath.length > levelIndex) {
            const key = item.drilldownPath[levelIndex];
            if (key && key !== 'Unknown') {
              optionsMap[key] = (optionsMap[key] || 0) + 1;
              hasNextLevel = true;
            }
          }
        });
        
        if (!hasNextLevel) return null;

        const entries = Object.entries(optionsMap);
        if (levelIndex === 0) {
          entries.sort((a, b) => (CATEGORY_ORDER[a[0]] || 99) - (CATEGORY_ORDER[b[0]] || 99));
        } else {
          entries.sort((a, b) => b[1] - a[1]);
        }
        return entries;
      };

      const getIconForCategory = (name, parentCategory = null, iconSize = 32) => {
        const n = String(name || '').toUpperCase(); 
        if (n === 'LAPTOP' || n === 'MACBOOK' || n.includes('LAPTOP')) return <Laptop size={iconSize} className="text-blue-500" />;
        if (n === 'DESKTOP' || n.includes('DESKTOP')) return <HardDrive size={iconSize} className="text-indigo-500" />;
        if (n === 'HEADSETS' || n === 'HEADSET' || n.includes('HEADSET')) return <Headphones size={iconSize} className="text-pink-500" />;
        if (n === 'MONITOR' || n.includes('MONITOR')) return <Monitor size={iconSize} className="text-teal-500" />;
        return <ChevronRight size={iconSize} className="text-gray-400" />;
      };

      const options = getNextLevelOptions();

      // UPLOAD SCREEN
      if (rawData.length === 0) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6">
            <div className="bg-white p-10 rounded-2xl shadow-xl max-w-lg w-full text-center border border-slate-100">
              <div className="bg-blue-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                <FileSpreadsheet className="text-blue-600" size={40} />
              </div>
              <h1 className="text-2xl font-bold text-slate-800 mb-2">IT Asset Catalog Dashboard</h1>
              <p className="text-slate-500 mb-8">Upload your IT asset CSV file to view an interactive report of all devices, current statuses, and warranty details.</p>
              
              <label className="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-lg shadow-sm transition-colors flex items-center justify-center gap-2">
                <Upload size={20} />
                <span>Select CSV File</span>
                <input type="file" accept=".csv" className="hidden" onChange={(e) => {
                  const file = e.target.files[0];
                  if (!file) return;
                  const reader = new FileReader();
                  reader.onload = (evt) => {
                    try {
                      const text = evt.target.result;
                      const parsed = parseCSV(text);
                      if (parsed.length > 1) {
                        const newHeaders = parsed[0];
                        const newData = parsed.slice(1);
                        setHeaders(newHeaders);
                        setRawData(newData);
                        try {
                          sessionStorage.setItem('itAssetHeaders', JSON.stringify(newHeaders));
                          sessionStorage.setItem('itAssetData', JSON.stringify(newData));
                        } catch (err) {
                          console.warn("File too large for session storage.");
                        }
                      }
                    } catch (err) {
                      alert("Failed to parse CSV file. Ensure it is a valid Snipe-IT export.");
                    }
                  };
                  reader.readAsText(file);
                }} />
              </label>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans">
          
          {window.__IS_EXPORTED_SNAPSHOT__ && (
            <div className="bg-amber-100 border-b border-amber-200 text-amber-800 px-6 py-2 text-sm font-bold flex justify-center items-center gap-2">
               <Info size={16} /> This is a standalone interactive snapshot of the IT Asset Catalog. Data is available offline.
            </div>
          )}

          {/* TOP HEADER */}
          <header className="bg-white border-b border-slate-200 px-6 py-4 flex flex-col md:flex-row items-start md:items-center justify-between sticky top-0 z-10 gap-4">
            
            {/* TABS & BREADCRUMBS */}
            <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4 w-full md:w-auto">
              
              {/* Custom Tab Switcher */}
              <div className="flex bg-slate-100 p-1 rounded-lg shrink-0">
                <button 
                  className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors flex items-center gap-1 ${activeTab==='dashboard' ? 'bg-white shadow text-blue-700' : 'text-slate-500 hover:text-slate-700'}`} 
                  onClick={() => setActiveTab('dashboard')}
                >
                  <Activity size={16}/> Dashboard
                </button>
                <button 
                  className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors flex items-center gap-1 ${activeTab==='reports' ? 'bg-white shadow text-blue-700' : 'text-slate-500 hover:text-slate-700'}`} 
                  onClick={() => setActiveTab('reports')}
                >
                  <FileText size={16}/> Reports
                </button>
              </div>

              {/* Breadcrumbs (Only show in Dashboard view) */}
              {activeTab === 'dashboard' && (
                <div className="flex items-center gap-2 overflow-x-auto whitespace-nowrap scrollbar-hide">
                  <ChevronRight size={16} className="text-slate-300 shrink-0" />
                  <button onClick={() => navigateUp(0)} className="text-slate-500 hover:text-blue-600 font-semibold flex items-center gap-1 transition-colors">
                    Home
                  </button>
                  
                  {inventoryStatusFilter !== 'ALL' && (
                    <React.Fragment>
                      <ChevronRight size={16} className="text-slate-400 shrink-0" />
                      <button 
                        onClick={() => setInventoryStatusFilter('ALL')} 
                        className="font-semibold text-blue-700 bg-blue-50 px-2 py-0.5 rounded-md flex items-center gap-1 border border-blue-200 hover:bg-red-50 hover:text-red-700 hover:border-red-200 transition-colors shadow-sm"
                        title="Clear Status Filter"
                      >
                         {inventoryStatusFilter} <span className="text-lg leading-none">&times;</span>
                      </button>
                    </React.Fragment>
                  )}

                  {path.map((segment, idx) => (
                    <React.Fragment key={idx}>
                      <ChevronRight size={16} className="text-slate-400 shrink-0" />
                      <button onClick={() => navigateUp(idx + 1)} className={"font-semibold transition-colors " + (idx === path.length - 1 ? "text-blue-700" : "text-slate-500 hover:text-blue-600")}>
                        {segment}
                      </button>
                    </React.Fragment>
                  ))}
                </div>
              )}
            </div>
            
            {/* RIGHT HEADER ACTIONS */}
            <div className="flex items-center gap-3 w-full md:w-auto overflow-x-auto justify-end">
              <div className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 shrink-0">
                <MapPin size={16} className="text-slate-400" />
                <select value={selectedLocation} onChange={(e) => setSelectedLocation(e.target.value)} className="bg-transparent text-sm font-medium text-slate-700 focus:outline-none cursor-pointer max-w-[200px]">
                  <option value="ALL">All Locations</option>
                  {availableLocations.map(loc => (<option key={loc} value={loc}>{loc}</option>))}
                </select>
              </div>

              {!window.__IS_EXPORTED_SNAPSHOT__ && (
                <label className="cursor-pointer flex items-center gap-2 bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 px-4 py-2 rounded-lg font-medium transition-colors shadow-sm shrink-0">
                  <Upload size={18} />
                  <span className="hidden lg:inline">Upload New File</span>
                  <input type="file" accept=".csv" className="hidden" onChange={handleFileUploadInline} />
                </label>
              )}

              {!window.__IS_EXPORTED_SNAPSHOT__ && (
                <button onClick={triggerExport} className="flex items-center gap-2 bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100 px-4 py-2 rounded-lg font-medium transition-colors shadow-sm shrink-0">
                  <Download size={18} />
                  <span className="hidden lg:inline">Export Interactive System</span>
                </button>
              )}
            </div>
          </header>

          <main className="max-w-7xl mx-auto p-6 space-y-6">
            
            {/* ---------------- REPORTS TAB VIEW ---------------- */}
            {activeTab === 'reports' ? (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden animate-in fade-in duration-300">

                          <tr className="hover:bg-slate-50"><td className="px-4 py-2 font-medium text-[#5C6B42]">Assets (Covered by Warranty)</td>{renderCell(reportMetrics.covered, () => handleReportCellClick('all', 'ALL', 'covered', 'Covered by Warranty'), 'px-4 py-2 text-right font-bold text-[#5C6B42]')}</tr>
                          <tr className="hover:bg-slate-50"><td className="px-4 py-2 font-medium text-[#EE536B]">Assets (Out of Warranty)</td>{renderCell(reportMetrics.outOfWty, () => handleReportCellClick('all', 'ALL', 'outOfWty', 'Out of Warranty'), 'px-4 py-2 text-right font-bold text-[#EE536B]')}</tr>
                        </tbody>
                      </table>
                    </div>
                    {/* Location Table */}
                    <div className="border border-slate-200 rounded-lg overflow-hidden h-full max-h-64 overflow-y-auto">

                        <tbody className="divide-y divide-slate-100 bg-white">

                            <tr key={i} className="hover:bg-slate-50">
                              <td className="px-4 py-2 font-medium">{loc.name}</td>
                              {renderCell(loc.count, () => handleReportCellClick('location', loc.name, 'count', 'Location Total'), 'px-4 py-2 text-right font-bold text-slate-800')}

                          ))}
                          {reportLocations.length === 0 && <tr><td colSpan="2" className="px-4 py-4 text-center text-slate-400">No location data found.</td></tr>}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  {/* Category Summary */}
                  <div>
                    <h3 className="font-bold text-slate-800 text-lg mb-3">Category Summary</h3>
                    <div className="border border-slate-200 rounded-lg overflow-x-auto shadow-sm max-h-96 overflow-y-auto">
                      <table className="w-full text-sm text-left whitespace-nowrap relative">
                        <thead className="bg-[#5C6B42] text-white text-xs sticky top-0 z-10">
                          <tr>
                            <th className="px-4 py-3">Category</th>
                            <th className="px-4 py-3 text-right">Count</th>
                            <th className="px-4 py-3 text-right text-white/80">Covered</th>
                            <th className="px-4 py-3 text-right text-red-200 border-r border-slate-500/50">Out Wty</th>
                            {showAssigned && <th className="px-4 py-3 text-right">Assigned</th>}
                            {showBrokenDeployed && <th className="px-4 py-3 text-right">Broken (Deployed)</th>}
                            {showReadyAssign && <th className="px-4 py-3 text-right">Ready for Assignment</th>}
                            {showReadyDispose && <th className="px-4 py-3 text-right">Ready for Disposal</th>}
                            {showEvaluate && <th className="px-4 py-3 text-right">Evaluate / Investigate</th>}
                            {showRepair && <th className="px-4 py-3 text-right">Out for Repair</th>}
                            {showLost && <th className="px-4 py-3 text-right">Lost or Stolen</th>}
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100 bg-white">
                          {reportCategories.map((row, i) => (
                            <tr key={i} className="hover:bg-slate-50">

                              {renderCell(row.count, () => handleReportCellClick('category', row.name, 'count', 'Total Count'), 'px-4 py-3 text-right font-bold text-slate-800')}
                              {renderCell(row.covered, () => handleReportCellClick('category', row.name, 'covered', 'Covered by Warranty'), 'px-4 py-3 text-right font-semibold text-[#5C6B42]')}
                              {renderCell(row.outOfWty, () => handleReportCellClick('category', row.name, 'outOfWty', 'Out of Warranty'), 'px-4 py-3 text-right font-semibold text-[#EE536B] border-r border-slate-100')}
                              {showAssigned && renderCell(row.assigned, () => handleReportCellClick('category', row.name, 'assigned', 'Assigned'), 'px-4 py-3 text-right text-slate-600')}
                              {showBrokenDeployed && renderCell(row.brokenDeployed, () => handleReportCellClick('category', row.name, 'brokenDeployed', 'Broken (Deployed)'), 'px-4 py-3 text-right text-slate-600')}
                              {showReadyAssign && renderCell(row.readyAssign, () => handleReportCellClick('category', row.name, 'readyAssign', 'Ready for Assignment'), 'px-4 py-3 text-right text-slate-600')}
                              {showReadyDispose && renderCell(row.readyDispose, () => handleReportCellClick('category', row.name, 'readyDispose', 'Ready for Disposal'), 'px-4 py-3 text-right text-slate-600')}
                              {showEvaluate && renderCell(row.evaluate, () => handleReportCellClick('category', row.name, 'evaluate', 'Evaluate / Investigate'), 'px-4 py-3 text-right text-slate-600')}
                              {showRepair && renderCell(row.repair, () => handleReportCellClick('category', row.name, 'repair', 'Out for Repair'), 'px-4 py-3 text-right text-slate-600')}
                              {showLost && renderCell(row.lost, () => handleReportCellClick('category', row.name, 'lost', 'Lost or Stolen'), 'px-4 py-3 text-right text-slate-600')}
                            </tr>
                          ))}
                          {reportCategories.length === 0 && <tr><td colSpan={4 + [showAssigned, showBrokenDeployed, showReadyAssign, showReadyDispose, showEvaluate, showRepair, showLost].filter(Boolean).length} className="px-4 py-8 text-center text-slate-400">No records found.</td></tr>}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  {/* Model Summary */}
                  <div>
                    <h3 className="font-bold text-slate-800 text-lg mb-3">Model Summary</h3>
                    <div className="border border-slate-200 rounded-lg overflow-x-auto shadow-sm max-h-96 overflow-y-auto">
                      <table className="w-full text-sm text-left whitespace-nowrap relative">
                        <thead className="bg-[#5C6B42] text-white text-xs sticky top-0 z-10">
                          <tr>
                            <th className="px-4 py-3">Category</th>
                            <th className="px-4 py-3">Model</th>
                            <th className="px-4 py-3 text-right">Count</th>
                            <th className="px-4 py-3 text-right text-white/80">Covered</th>
                            <th className="px-4 py-3 text-right text-red-200 border-r border-slate-500/50">Out Wty</th>
                            {showAssigned && <th className="px-4 py-3 text-right">Assigned</th>}
                            {showBrokenDeployed && <th className="px-4 py-3 text-right">Broken (Deployed)</th>}
                            {showReadyAssign && <th className="px-4 py-3 text-right">Ready for Assignment</th>}
                            {showReadyDispose && <th className="px-4 py-3 text-right">Ready for Disposal</th>}
                            {showEvaluate && <th className="px-4 py-3 text-right">Evaluate / Investigate</th>}
                            {showRepair && <th className="px-4 py-3 text-right">Out for Repair</th>}
                            {showLost && <th className="px-4 py-3 text-right">Lost or Stolen</th>}
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100 bg-white">

                            <tr key={i} className="hover:bg-slate-50">

                              <td className="px-4 py-3 font-medium text-slate-700">{row.name}</td>
                              {renderCell(row.count, () => handleReportCellClick('model', row.name, 'count', 'Total Count'), 'px-4 py-3 text-right font-bold text-slate-800')}
                              {renderCell(row.covered, () => handleReportCellClick('model', row.name, 'covered', 'Covered by Warranty'), 'px-4 py-3 text-right font-semibold text-[#5C6B42]')}
                              {renderCell(row.outOfWty, () => handleReportCellClick('model', row.name, 'outOfWty', 'Out of Warranty'), 'px-4 py-3 text-right font-semibold text-[#EE536B] border-r border-slate-100')}
                              {showAssigned && renderCell(row.assigned, () => handleReportCellClick('model', row.name, 'assigned', 'Assigned'), 'px-4 py-3 text-right text-slate-600')}
                              {showBrokenDeployed && renderCell(row.brokenDeployed, () => handleReportCellClick('model', row.name, 'brokenDeployed', 'Broken (Deployed)'), 'px-4 py-3 text-right text-slate-600')}
                              {showReadyAssign && renderCell(row.readyAssign, () => handleReportCellClick('model', row.name, 'readyAssign', 'Ready for Assignment'), 'px-4 py-3 text-right text-slate-600')}
                              {showReadyDispose && renderCell(row.readyDispose, () => handleReportCellClick('model', row.name, 'readyDispose', 'Ready for Disposal'), 'px-4 py-3 text-right text-slate-600')}
                              {showEvaluate && renderCell(row.evaluate, () => handleReportCellClick('model', row.name, 'evaluate', 'Evaluate / Investigate'), 'px-4 py-3 text-right text-slate-600')}
                              {showRepair && renderCell(row.repair, () => handleReportCellClick('model', row.name, 'repair', 'Out for Repair'), 'px-4 py-3 text-right text-slate-600')}
                              {showLost && renderCell(row.lost, () => handleReportCellClick('model', row.name, 'lost', 'Lost or Stolen'), 'px-4 py-3 text-right text-slate-600')}
                            </tr>
                          ))}
                          {reportModels.length === 0 && <tr><td colSpan={5 + [showAssigned, showBrokenDeployed, showReadyAssign, showReadyDispose, showEvaluate, showRepair, showLost].filter(Boolean).length} className="px-4 py-8 text-center text-slate-400">No records found.</td></tr>}
                        </tbody>
                      </table>
                    </div>
                  </div>

                </div>
              </div>
